<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tour de Controle - TAXI HENRION</title>
    <meta name="description" content="Dashboard de regulation et planning chauffeurs pour Taxi Henrion. Gestion des courses en temps reel.">
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/locales/fr.global.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary:       #1a2640;
            --primary-light: #2c3e50;
            --accent:        #f1c40f;
            --accent-glow:   rgba(241, 196, 15, 0.15);
            --cyril-bg:      rgba(241, 196, 15, 0.25);
            --cyril-border:  #f1c40f;
            --bg:            #0f1923;
            --surface:       #1c2b3a;
            --surface-2:     #243447;
            --border:        rgba(255,255,255,0.07);
            --text:          #e8edf2;
            --text-muted:    #8fa5bd;
            --radius:        10px;
            --shadow:        0 4px 24px rgba(0,0,0,0.35);
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 14px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            gap: 14px;
            overflow: hidden;
        }
        header {
            background: linear-gradient(135deg, var(--primary) 0%, #243447 100%);
            border: 1px solid var(--border);
            padding: 13px 20px;
            border-radius: var(--radius);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
            flex-shrink: 0;
        }
        header h1 { font-size: 19px; font-weight: 700; letter-spacing: 0.3px; display: flex; align-items: center; gap: 10px; }
        header h1::before { content: ''; font-size: 20px; }
        .status-container { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-muted); }
        .status-dot { width: 9px; height: 9px; border-radius: 50%; background: #e74c3c; flex-shrink: 0; transition: background 0.4s; }
        .status-dot.local  { background: #e67e22; box-shadow: 0 0 6px rgba(230,126,34,0.6); }
        .status-dot.online { background: #2ecc71; box-shadow: 0 0 6px rgba(46,204,113,0.6); }
        .main-container { display: flex; gap: 14px; flex: 1; min-height: 0; }
        #sidebar-left {
            width: 295px; background: var(--surface); border: 1px solid var(--border);
            padding: 16px; border-radius: var(--radius); box-shadow: var(--shadow);
            display: flex; flex-direction: column; gap: 14px; overflow-y: auto; flex-shrink: 0;
        }
        #calendar-container {
            flex: 1; background: var(--surface); border: 1px solid var(--border);
            padding: 14px; border-radius: var(--radius); box-shadow: var(--shadow);
            min-height: 0; overflow: hidden; display: flex; flex-direction: column;
        }
        #calendar { flex: 1; min-height: 0; }
        #sidebar-right {
            width: 270px; background: var(--surface); border: 1px solid var(--border);
            padding: 16px; border-radius: var(--radius); box-shadow: var(--shadow);
            display: flex; flex-direction: column; gap: 12px; overflow-y: auto; flex-shrink: 0;
        }
        .section-title {
            font-size: 12px; font-weight: 700; color: var(--accent);
            text-transform: uppercase; letter-spacing: 0.8px;
            border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-bottom: 2px;
        }
        .form-group { display: flex; flex-direction: column; gap: 5px; position: relative; }
        label { font-weight: 600; color: var(--text-muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
        input, select {
            padding: 9px 11px; background: var(--surface-2); border: 1px solid var(--border);
            border-radius: 6px; font-size: 13px; color: var(--text); font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s; width: 100%;
        }
        input:focus, select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
        input::placeholder { color: var(--text-muted); }
        select option { background: var(--surface-2); }
        input[type="datetime-local"]::-webkit-calendar-picker-indicator { filter: invert(1) opacity(0.5); cursor: pointer; }
        .autocomplete-suggestions {
            background: var(--surface-2); border: 1px solid var(--accent); border-top: none;
            border-radius: 0 0 6px 6px; max-height: 150px; overflow-y: auto;
            position: absolute; top: 100%; left: 0; right: 0; z-index: 1000;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }
        .suggestion-item {
            padding: 8px 11px; cursor: pointer; font-size: 12px; color: var(--text);
            transition: background 0.15s; border-bottom: 1px solid var(--border);
        }
        .suggestion-item:last-child { border-bottom: none; }
        .suggestion-item:hover { background: var(--accent-glow); color: var(--accent); }
        .btn {
            padding: 9px 14px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600;
            cursor: pointer; font-family: inherit; transition: opacity 0.2s, transform 0.1s;
            width: 100%; text-align: center;
        }
        .btn:hover  { opacity: 0.88; }
        .btn:active { transform: scale(0.98); }
        .btn-primary { background: linear-gradient(135deg, var(--accent) 0%, #e2b70e 100%); color: var(--primary); }
        .btn-secondary { background: var(--surface-2); color: var(--text-muted); border: 1px solid var(--border); }
        .btn-danger { background: rgba(231,76,60,0.15); color: #e74c3c; border: 1px solid rgba(231,76,60,0.3); font-size: 12px; padding: 6px 10px; }
        .sep { border: none; border-top: 1px solid var(--border); margin: 2px 0; }
        .driver-card {
            background: var(--surface-2); border-radius: 8px; padding: 11px 12px;
            border-left: 4px solid #555; transition: box-shadow 0.2s;
        }
        .driver-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.3); }
        .driver-card-header { display: flex; align-items: center; justify-content: space-between; font-weight: 700; font-size: 13px; color: var(--text); }
        .driver-badge { font-size: 10px; font-weight: 700; background: rgba(255,255,255,0.1); padding: 2px 7px; border-radius: 20px; color: var(--text-muted); }
        .driver-trip { font-size: 11.5px; margin-top: 5px; color: var(--text-muted); line-height: 1.5; }
        .driver-trip strong { color: var(--text); }
        .fc {
            --fc-border-color: var(--border);
            --fc-button-bg-color: var(--surface-2);
            --fc-button-border-color: var(--border);
            --fc-button-text-color: var(--text);
            --fc-button-hover-bg-color: var(--primary-light);
            --fc-button-hover-border-color: var(--accent);
            --fc-button-active-bg-color: var(--primary);
            --fc-today-bg-color: rgba(241, 196, 15, 0.06);
            --fc-neutral-bg-color: var(--surface);
            --fc-neutral-text-color: var(--text-muted);
            --fc-page-bg-color: var(--surface);
            --fc-event-border-color: transparent;
            --fc-highlight-color: var(--accent-glow);
        }
        .fc .fc-col-header-cell-cushion,
        .fc .fc-timegrid-slot-label-cushion,
        .fc .fc-toolbar-title,
        .fc .fc-daygrid-day-number { color: var(--text); }
        .fc .fc-button { font-size: 12px; font-family: inherit; text-transform: capitalize; }
        .fc .fc-event { border-radius: 5px; font-size: 11.5px; font-weight: 600; cursor: pointer; }
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 9999;
            display: flex; align-items: center; justify-content: center; animation: fadeIn 0.15s ease;
        }
        .modal-overlay.hidden { display: none; }
        .modal-box {
            background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 24px; min-width: 320px; max-width: 90vw;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6); animation: slideUp 0.2s ease;
        }
        .modal-title { font-size: 15px; font-weight: 700; margin-bottom: 8px; }
        .modal-meta  { font-size: 12px; color: var(--text-muted); margin-bottom: 18px; line-height: 1.6; }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
        @keyframes fadeIn  { from { opacity:0 } to { opacity:1 } }
        @keyframes slideUp { from { transform: translateY(16px); opacity:0 } to { transform: translateY(0); opacity:1 } }
        @media print {
            @page { size: A4 landscape; margin: 10mm; }
            body { background: #fff !important; color: #000 !important; height: auto !important; overflow: visible !important; padding: 0 !important; }
            header, #sidebar-left, #sidebar-right, .modal-overlay { display: none !important; }
            .main-container { display: block !important; gap: 0 !important; }
            #calendar-container { width: 100% !important; border: none !important; box-shadow: none !important; padding: 0 !important; background: #fff !important; overflow: visible !important; }
            .fc-event, .fc-event * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            .fc { --fc-border-color: #ccc; --fc-today-bg-color: #fffbe6; }
            .fc .fc-col-header-cell-cushion, .fc .fc-timegrid-slot-label-cushion, .fc .fc-toolbar-title { color: #000 !important; }
        }
    </style>
</head>
<body>
    <header>
        <h1>Tour de Controle - TAXI HENRION</h1>
        <div class="status-container">
            <div id="sync-status" class="status-dot"></div>
            <span id="sync-text">Verification de la connexion...</span>
        </div>
    </header>

    <div class="main-container">
        <div id="sidebar-left">
            <div class="section-title">Nouvelle Course</div>
            <form id="course-form">
                <div class="form-group" style="margin-bottom:10px;">
                    <label for="adresse-depart">Prise en charge (Depart)</label>
                    <input type="text" id="adresse-depart" placeholder="Lieu ou Adresse..." autocomplete="off" required>
                    <div id="depart-suggestions" class="autocomplete-suggestions" style="display:none;"></div>
                </div>
                <div class="form-group" style="margin-bottom:10px;">
                    <label for="adresse-destination">Destination (Depose)</label>
                    <input type="text" id="adresse-destination" placeholder="Hopital, Clinique, Gare..." autocomplete="off" required>
                    <div id="destination-suggestions" class="autocomplete-suggestions" style="display:none;"></div>
                </div>
                <div class="form-group" style="margin-bottom:10px;">
                    <label for="heure-depart">Date et Heure de rendez-vous</label>
                    <input type="datetime-local" id="heure-depart" required>
                </div>
                <div class="form-group" style="margin-bottom:14px;">
                    <label for="chauffeur-select">Affectation Chauffeur</label>
                    <select id="chauffeur-select">
                        <option value="Cyril">Cyril (Surligne Jaune)</option>
                        <option value="Anthony">Anthony (Bleu)</option>
                        <option value="Chauffeur 3">Chauffeur 3 (Vert)</option>
                    </select>
                </div>
                <button type="submit" id="btn-submit-course" class="btn btn-primary">+ Planifier la course</button>
            </form>
            <hr class="sep">
            <div class="section-title" style="margin-top:4px;">Outils</div>
            <button id="btn-print" class="btn btn-secondary" onclick="window.print()">Imprimer la feuille de route</button>
            <button id="btn-clear-local" class="btn btn-danger" onclick="clearAllLocal()">Effacer toutes les courses locales</button>
            <hr class="sep">
            <div class="section-title" style="margin-top:4px;">Legende</div>
            <div style="display:flex; flex-direction:column; gap:6px; font-size:12px;">
                <div style="display:flex; align-items:center; gap:8px;">
                    <span style="display:inline-block; width:14px; height:14px; border-radius:3px; background:rgba(241,196,15,0.25); border:2px solid #f1c40f;"></span>
                    <span>Cyril</span>
                </div>
                <div style="display:flex; align-items:center; gap:8px;">
                    <span style="display:inline-block; width:14px; height:14px; border-radius:3px; background:#3498db;"></span>
                    <span>Anthony</span>
                </div>
                <div style="display:flex; align-items:center; gap:8px;">
                    <span style="display:inline-block; width:14px; height:14px; border-radius:3px; background:#2ecc71;"></span>
                    <span>Chauffeur 3</span>
                </div>
            </div>
        </div>

        <div id="calendar-container">
            <div id="calendar"></div>
        </div>

        <div id="sidebar-right">
            <div class="section-title">Activite Chauffeurs</div>
            <div id="driver-summary-list"></div>
        </div>
    </div>

    <div id="event-modal" class="modal-overlay hidden">
        <div class="modal-box">
            <div class="modal-title" id="modal-title"></div>
            <div class="modal-meta"  id="modal-meta"></div>
            <div class="modal-actions">
                <button class="btn btn-secondary" style="width:auto; padding:8px 18px;" onclick="closeModal()">Fermer</button>
                <button class="btn btn-danger"    style="width:auto; padding:8px 18px;" id="modal-delete-btn">Supprimer</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "TON_SUPABASE_URL_ICI";
        const SUPABASE_KEY = "TA_CLE_ANON_PUBLIC_ICI";

        let supabaseClient = null;
        if (SUPABASE_URL !== "TON_SUPABASE_URL_ICI" && typeof supabase !== 'undefined') {
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        }

        const driverColors = {
            'Cyril':       { background: 'rgba(241, 196, 15, 0.25)', text: '#1a2640', border: '#f1c40f' },
            'Anthony':     { background: '#3498db',  text: '#ffffff', border: '#2980b9' },
            'Chauffeur 3': { background: '#2ecc71',  text: '#ffffff', border: '#27ae60' }
        };

        const syncStatusDot  = document.getElementById('sync-status');
        const syncStatusText = document.getElementById('sync-text');
        let calendar;
        let pendingDeleteEventId = null;

        function updateStatus(type) {
            if (type === 'cloud') {
                syncStatusDot.className = 'status-dot online';
                syncStatusText.textContent = 'Synchronise - Cloud Supabase';
            } else {
                syncStatusDot.className = 'status-dot local';
                syncStatusText.textContent = 'Sauvegarde locale uniquement (LocalStorage)';
            }
        }

        function updateRightSidebar() {
            const container = document.getElementById('driver-summary-list');
            if (!container || !calendar) return;
            container.innerHTML = '';
            const events = calendar.getEvents();
            const groups = { 'Cyril': [], 'Anthony': [], 'Chauffeur 3': [] };
            events.forEach(ev => {
                const d = ev.extendedProps.driver;
                if (groups[d]) groups[d].push(ev);
            });
            for (const driver in groups) {
                groups[driver].sort((a, b) => a.start - b.start);
                const card = document.createElement('div');
                card.className = 'driver-card';
                card.style.borderLeftColor = driverColors[driver]?.border || '#555';
                let tripsHTML = '';
                if (groups[driver].length === 0) {
                    tripsHTML = '<div class="driver-trip" style="font-style:italic;">Aucune course planifiee</div>';
                } else {
                    groups[driver].forEach(ev => {
                        const timeStr = ev.start
                            ? ev.start.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' })
                            : '--:--';
                        const parts = ev.title.split('>');
                        const depart = parts[0]?.trim() || ev.title;
                        tripsHTML += '<div class="driver-trip">- <strong>' + timeStr + '</strong> - ' + depart + '</div>';
                    });
                }
                card.innerHTML = '<div class="driver-card-header"><span>' + driver + '</span><span class="driver-badge">' + groups[driver].length + ' course' + (groups[driver].length !== 1 ? 's' : '') + '</span></div>' + tripsHTML;
                container.appendChild(card);
            }
        }

        async function loadEvents() {
            if (supabaseClient) {
                try {
                    const { data, error } = await supabaseClient.from('courses').select('*');
                    if (!error && data) {
                        updateStatus('cloud');
                        return data.map(c => buildEventObject(c.id, c.title, c.start_time, c.end_time, c.driver));
                    }
                } catch (e) {
                    console.warn('Erreur Supabase - repli sur LocalStorage :', e);
                }
            }
            updateStatus('local');
            const raw = localStorage.getItem('taxi_courses');
            return raw ? JSON.parse(raw) : [];
        }

        async function saveEvent(eventData, isNew = true) {
            let local = JSON.parse(localStorage.getItem('taxi_courses') || '[]');
            if (isNew) { local.push(eventData); }
            else { local = local.map(e => e.id === eventData.id ? eventData : e); }
            localStorage.setItem('taxi_courses', JSON.stringify(local));
            if (supabaseClient) {
                const payload = {
                    title:      eventData.title,
                    start_time: eventData.start,
                    end_time:   eventData.end,
                    driver:     eventData.extendedProps?.driver || 'Cyril',
                    color:      eventData.backgroundColor
                };
                if (!isNew) payload.id = eventData.id;
                const { error } = await supabaseClient.from('courses').upsert(payload);
                if (error) console.warn('Erreur upsert Supabase :', error.message);
            }
            updateRightSidebar();
        }

        async function deleteEventFromStorage(eventId) {
            let local = JSON.parse(localStorage.getItem('taxi_courses') || '[]');
            local = local.filter(e => e.id !== eventId);
            localStorage.setItem('taxi_courses', JSON.stringify(local));
            if (supabaseClient) {
                const { error } = await supabaseClient.from('courses').delete().eq('id', eventId);
                if (error) console.warn('Erreur delete Supabase :', error.message);
            }
            updateRightSidebar();
        }

        function buildEventObject(id, title, start, end, driver) {
            const colors = driverColors[driver] || { background: '#7f8c8d', text: '#fff', border: '#7f8c8d' };
            return {
                id, title, start,
                end: end || new Date(new Date(start).getTime() + 3600000).toISOString(),
                backgroundColor: colors.background,
                textColor:       colors.text,
                borderColor:     colors.border,
                extendedProps: { driver }
            };
        }

        function openModal(event) {
            pendingDeleteEventId = event.id;
            const driver   = event.extendedProps.driver;
            const start    = event.start;
            const end      = event.end;
            const dateStr  = start ? start.toLocaleDateString('fr-FR', { weekday:'long', year:'numeric', month:'long', day:'numeric' }) : '-';
            const startStr = start ? start.toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' }) : '-';
            const endStr   = end   ? end.toLocaleTimeString('fr-FR',   { hour:'2-digit', minute:'2-digit' }) : '-';
            document.getElementById('modal-title').textContent = event.title;
            document.getElementById('modal-meta').innerHTML =
                'Date : <strong>' + dateStr + '</strong><br>' +
                'Heure : ' + startStr + ' - ' + endStr + '<br>' +
                'Chauffeur : <strong>' + driver + '</strong>';
            document.getElementById('event-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('event-modal').classList.add('hidden');
            pendingDeleteEventId = null;
        }

        document.getElementById('modal-delete-btn').addEventListener('click', async () => {
            if (!pendingDeleteEventId) return;
            const ev = calendar.getEventById(pendingDeleteEventId);
            if (ev) { await deleteEventFromStorage(ev.id); ev.remove(); }
            closeModal();
        });

        document.getElementById('event-modal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        function clearAllLocal() {
            if (!confirm('Supprimer TOUTES les courses locales ?')) return;
            localStorage.removeItem('taxi_courses');
            calendar.removeAllEvents();
            updateRightSidebar();
        }

        document.addEventListener('DOMContentLoaded', async function () {
            const calendarEl    = document.getElementById('calendar');
            const initialEvents = await loadEvents();

            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView:   'timeGridWeek',
                locale:        'fr',
                slotMinTime:   '06:00:00',
                slotMaxTime:   '22:00:00',
                firstDay:      1,
                allDaySlot:    false,
                editable:      true,
                height:        '100%',
                headerToolbar: { left: 'prev,next today', center: 'title', right: 'timeGridWeek,timeGridDay' },
                events: initialEvents,
                datesSet: () => updateRightSidebar(),
                eventDrop: async function (info) {
                    const end = info.event.end
                        ? info.event.end.toISOString()
                        : new Date(info.event.start.getTime() + 3600000).toISOString();
                    await saveEvent(buildEventObject(info.event.id, info.event.title, info.event.start.toISOString(), end, info.event.extendedProps.driver), false);
                },
                eventResize: async function (info) {
                    await saveEvent(buildEventObject(info.event.id, info.event.title, info.event.start.toISOString(), info.event.end.toISOString(), info.event.extendedProps.driver), false);
                },
                eventClick: function (info) { openModal(info.event); }
            });

            calendar.render();
            updateRightSidebar();

            if (supabaseClient) {
                supabaseClient.channel('taxi-henrion-realtime')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'courses' }, async () => {
                        const refreshed = await loadEvents();
                        calendar.removeAllEvents();
                        calendar.addEventSource(refreshed);
                        updateRightSidebar();
                    })
                    .subscribe();
            }
        });

        function setupAutocomplete(inputId, suggestionId) {
            const input       = document.getElementById(inputId);
            const suggestions = document.getElementById(suggestionId);
            let debounceTimer;
            input.addEventListener('input', function () {
                clearTimeout(debounceTimer);
                const query = this.value.trim();
                if (query.length < 3) { suggestions.style.display = 'none'; return; }
                debounceTimer = setTimeout(() => {
                    fetch('https://api-adresse.data.gouv.fr/search/?q=' + encodeURIComponent(query) + '&limit=5')
                        .then(r => r.json())
                        .then(data => {
                            suggestions.innerHTML = '';
                            if (!data.features || data.features.length === 0) { suggestions.style.display = 'none'; return; }
                            data.features.forEach(feature => {
                                const div = document.createElement('div');
                                div.className = 'suggestion-item';
                                div.textContent = feature.properties.label;
                                div.addEventListener('click', function () {
                                    input.value = feature.properties.label;
                                    suggestions.style.display = 'none';
                                });
                                suggestions.appendChild(div);
                            });
                            suggestions.style.display = 'block';
                        })
                        .catch(() => { suggestions.style.display = 'none'; });
                }, 280);
            });
            document.addEventListener('click', function (e) {
                if (e.target !== input) suggestions.style.display = 'none';
            });
        }

        setupAutocomplete('adresse-depart', 'depart-suggestions');
        setupAutocomplete('adresse-destination', 'destination-suggestions');

        document.getElementById('course-form').addEventListener('submit', async function (e) {
            e.preventDefault();
            const depart       = document.getElementById('adresse-depart').value.trim();
            const destination  = document.getElementById('adresse-destination').value.trim();
            const startTimeStr = document.getElementById('heure-depart').value;
            const driver       = document.getElementById('chauffeur-select').value;
            if (!startTimeStr || !depart || !destination) return;
            const start = new Date(startTimeStr);
            const end   = new Date(start.getTime() + 60 * 60 * 1000);
            const newEvent = buildEventObject(crypto.randomUUID(), depart + ' > ' + destination, start.toISOString(), end.toISOString(), driver);
            await saveEvent(newEvent, true);
            calendar.addEvent(newEvent);
            updateRightSidebar();
            this.reset();
        });
    </script>
</body>
</html>
